<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Documento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      height: 60px;
      background: #020617;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      font-size: 14px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      background: #22c55e;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
    }

    .btn:hover {
      background: #16a34a;
    }

    .viewer {
      flex: 1;
      background: #111827;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .fallback {
      display: none;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .fallback a {
      color: #22c55e;
      text-decoration: none;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      .header {
        font-size: 12px;
        padding: 0 10px;
      }

      .btn {
        padding: 5px 8px;
        font-size: 12px;
      }
    }
  </style>

</head>

<body>

<div class="header">
  <div class="title">📄 Documento</div>

  <div class="actions">
    <a class="btn" href="marta.pdf" target="_blank">Abrir</a>
    <a class="btn" href="marta.pdf" download>Baixar</a>
  </div>
</div>

<div class="viewer">
  <iframe src="marta.pdf"></iframe>
</div>

<div class="fallback" id="fallback">
  <p>Não foi possível visualizar o arquivo.</p>
  <a href="marta.pdf" target="_blank">Clique aqui para abrir</a>
</div>

<script>
  setTimeout(() => {
    const iframe = document.querySelector("iframe");
    try {
      if (!iframe.contentDocument) {
        document.getElementById("fallback").style.display = "block";
      }
    } catch (e) {
      document.getElementById("fallback").style.display = "block";
    }
  }, 2000);
</script>

</body>
</html>
