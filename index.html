<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Documento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      height: 60px;
      background: #020617;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 16px;
    }

    .header span {
      opacity: 0.8;
    }

    .btn {
      background: #22c55e;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      background: #16a34a;
    }

    .viewer {
      flex: 1;
      background: #111827;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .fallback {
      display: none;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .fallback a {
      color: #22c55e;
      text-decoration: none;
      font-size: 18px;
    }
  </style>

</head>

<body>

<div class="header">
  <div>📄 Documento</div>
  <a class="btn" href="marta.pdf" target="_blank">Abrir em nova aba</a>
</div>

<div class="viewer">
  <iframe src="marta.pdf"></iframe>
</div>

<div class="fallback" id="fallback">
  <p>Não foi possível visualizar o arquivo.</p>
  <a href="marta.pdf" target="_blank">Clique aqui para abrir</a>
</div>

<script>
  // fallback simples se iframe falhar
  setTimeout(() => {
    const iframe = document.querySelector("iframe");
    try {
      if (!iframe.contentDocument) {
        document.getElementById("fallback").style.display = "block";
      }
    } catch (e) {
      document.getElementById("fallback").style.display = "block";
    }
  }, 2000);
</script>

</body>
</html>
